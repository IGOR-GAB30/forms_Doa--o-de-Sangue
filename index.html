<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doacao-de-sangue</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>DOAÇÃO DE SANGUE</h1>

    <main>

        <h3>FORMULÁRIO</h3>

        <div class="container">

            <form action="" id="formulario">

                <label for="Nome">Nome completo:</label>
                <input type="text" id="nome" required placeholder="Nome">

                <br>
                <br>

                <label for="Idade">Idade:</label>
                <input type="number" id="idade" required placeholder="Idade">

                <br>
                <br>

                <label for="peso">Peso:</label>
                <input type="number" id="peso" required placeholder="Peso">

                <br>
                <br>

                <label for="tipo_sanguineo">Tipo Sanguíneo:</label>
                <select id="tipo_sanguineo" required placeholder="tipo_sanguineo">
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>

                <br>
                <br>

                <label for="Email">Email:</label>
                <input type="email" id="email" required placeholder="Email">

                <br>
                <br>

                <label for="Telefone">Telefone:</label>
                <input type="text" id="telefone" required placeholder="(00)00000-0000">

                <br>
                <br>

                <label for="estado">Estado:</label>
                <select id="estado" required placeholder="estado">
                    <option value="Acre">AC</option>
                    <option value="Alagoas">AL</option>
                    <option value="Amapá">AP</option>
                    <option value="Amazonas">AM</option>
                    <option value="Bahia">BA</option>
                    <option value="Ceará">CE</option>
                    <option value="Distrito Federal">DF</option>
                    <option value="Espírito Santo">ES</option>
                    <option value="Goiás">GO</option>
                    <option value="Maranhão">MA</option>
                    <option value="Mato Grosso">MT</option>
                    <option value="Mato Grosso do Sul">MS</option>
                    <option value="Minas Gerais">MG</option>
                    <option value="Pará">PA</option>
                    <option value="Paraíba">PB</option>
                    <option value="Paraná">PR</option>
                    <option value="Pernambuco">PE</option>
                    <option value="Piauí">PI</option>
                    <option value="Rio de Janeiro">RJ</option>
                    <option value="Rio Grande do Norte">RN</option>
                    <option value="Rio Grande do Sul">RS</option>
                    <option value="Rondônia">RO</option>
                    <option value="Roraima">RR</option>
                    <option value="Santa Catarina">SC</option>
                    <option value="São Paulo">SP</option>
                    <option value="Sergipe">SE</option>
                    <option value="Tocantins">TO</option>
                </select>

                <br>
                <br>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" required placeholder="Cidade">

                <br>
                <br>

                <button type="submit" form="formulario">Enviar</button>

            </form>

            <div id="resultado"></div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
